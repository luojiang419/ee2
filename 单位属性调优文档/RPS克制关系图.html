<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','PingFang SC',sans-serif; background:#1a1a2e; color:#e0e0e0; min-height:100vh; }
.header { background:linear-gradient(135deg,#16213e,#0f3460); padding:20px; text-align:center; border-bottom:2px solid #e94560; }
.header h1 { font-size:24px; color:#fff; margin-bottom:5px; }
.header p { font-size:13px; color:#8899aa; }

/* Tabs */
.tabs { display:flex; justify-content:center; gap:4px; padding:15px 20px; background:#16213e; flex-wrap:wrap; }
.tab { padding:12px 32px; border:none; background:#1a1a2e; color:#8899aa; cursor:pointer; font-size:16px; font-weight:bold; border-radius:6px 6px 0 0; transition:all .2s; border:1px solid transparent; }
.tab:hover { color:#fff; background:#0f3460; }
.tab.active { background:#e94560; color:#fff; border-color:#e94560; }

/* Legend */
.legend { display:flex; justify-content:center; gap:25px; padding:12px; background:#16213e; flex-wrap:wrap; font-size:13px; }
.legend-item { display:flex; align-items:center; gap:6px; }
.leg-line { display:inline-block; width:40px; height:4px; border-radius:2px; }
.leg-strong { background:#ff4444; }
.leg-moderate { background:#ff8800; }
.leg-soft { background:#ffcc00; }
.leg-weak { background:#666; }

/* Main */
.main { padding:20px; max-width:1400px; margin:0 auto; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* Domain section */
.domain { margin-bottom:25px; }
.domain-title { font-size:16px; font-weight:bold; padding:8px 14px; border-radius:6px; margin-bottom:12px; display:inline-block; }
.domain-land { background:#2d5a27; color:#8fdf82; }
.domain-sea { background:#1a3a5c; color:#82c8f0; }
.domain-air { background:#5a3a6e; color:#d4a0f0; }
.domain-defense { background:#5a4a1a; color:#f0d482; }

/* Unit cards */
.units-row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:8px; }
.unit-card { padding:8px 14px; border-radius:6px; font-size:13px; text-align:center; min-width:100px; position:relative; border:1px solid rgba(255,255,255,.15); transition:transform .15s; }
.unit-card:hover { transform:translateY(-2px); z-index:10; }
.unit-card .name { font-weight:bold; display:block; }
.unit-card .type { font-size:10px; opacity:.7; display:block; }
.unit-card .rps { font-size:9px; opacity:.5; display:block; margin-top:2px; }

.card-land { background:linear-gradient(135deg,#2d5a27,#1a3d15); }
.card-sea { background:linear-gradient(135deg,#1a3a5c,#0d2240); }
.card-air { background:linear-gradient(135deg,#5a3a6e,#2d1a40); }
.card-defense { background:linear-gradient(135deg,#5a4a1a,#3d2a0d); }

/* Counter flow arrows section */
.flow-section { margin:20px 0; padding:15px; background:rgba(255,255,255,.03); border-radius:10px; border:1px solid rgba(255,255,255,.08); }
.flow-title { font-size:14px; font-weight:bold; margin-bottom:12px; color:#ccc; }
.flow-list { display:flex; flex-wrap:wrap; gap:8px; }
.flow-item { display:flex; align-items:center; gap:6px; font-size:12px; padding:5px 10px; border-radius:4px; background:rgba(0,0,0,.3); }
.flow-arrow { font-size:16px; font-weight:bold; }
.flow-strong { color:#ff4444; }
.flow-moderate { color:#ff8800; }
.flow-soft { color:#ffcc00; }
.flow-unit { padding:2px 6px; border-radius:3px; font-weight:bold; font-size:11px; }

/* Epoch info */
.epoch-info { text-align:center; padding:8px; margin-bottom:15px; font-size:12px; color:#667; }
.epoch-info span { color:#e94560; font-weight:bold; }

/* Responsive */
@media (max-width:768px) {
  .units-row { gap:6px; }
  .unit-card { min-width:80px; padding:6px 10px; font-size:11px; }
  .flow-list { gap:4px; }
  .flow-item { font-size:10px; padding:3px 6px; }

/* Tooltip */
.tooltip { display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#000; color:#fff; padding:6px 12px; border-radius:4px; font-size:11px; white-space:nowrap; z-index:100; pointer-events:none; }
.unit-card:hover .tooltip { display:block; }

// ==================== COLORS ====================
const strengthColors = {
  3: {bg:'rgba(255,68,68,.2)',border:'#ff4444',arrow:'#ff4444',label:'强克'},
  2: {bg:'rgba(255,136,0,.15)',border:'#ff8800',arrow:'#ff8800',label:'克制'},
  1: {bg:'rgba(255,204,0,.1)',border:'#ffcc00',arrow:'#ffcc00',label:'弱克'},
};

const domainColors = {
  land:'#8fdf82',
  sea:'#82c8f0',
  air:'#d4a0f0',
  defense:'#f0d482',
};

// ==================== RENDER ====================
function switchTab(epoch) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('content-'+epoch).classList.add('active');
}

function buildAll() {
  const main = document.getElementById('main');
  let html = '';
  const epochs = ['E11','E12','E13','E14','E15'];

  epochs.forEach((epoch, idx) => {
    const d = data[epoch];
    html += `<div class="tab-content${idx===0?' active':''}" id="content-${epoch}">`;
    html += `<div class="epoch-info">${d.label} — 共 ${d.land.length+d.sea.length+d.air.length+d.defense.length} 个单位，${d.flows.length} 条克制关系</div>`;

    // Unit cards
    const sections = [
      {title:'陆军单位',cls:'domain-land',items:d.land},
      {title:'海军单位',cls:'domain-sea',items:d.sea},
      {title:'空军单位',cls:'domain-air',items:d.air},
      {title:'防御建筑',cls:'domain-defense',items:d.defense},
    ];

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">';
    sections.forEach(sec => {
      html += `<div class="domain">`;
      html += `<div class="domain-title ${sec.cls}">${sec.title} (${sec.items.length})</div>`;
      html += '<div class="units-row">';
      sec.items.forEach(u => {
        html += `<div class="unit-card ${u.css}" id="card-${epoch}-${u.id}">
          <span class="name">${u.name}</span>
          <span class="type">${u.type}</span>
          <span class="rps">${u.rps}</span>
        </div>`;
      });
      html += '</div></div>';
    });
    html += '</div>';

    // Flow arrows
    html += '<div class="flow-section">';
    html += '<div class="flow-title">克制关系流向（攻击方 → 防御方 | 倍率）</div>';
    html += '<div class="flow-list">';

    // Group flows by strength
    const flowGroups = {3:[],2:[],1:[]};
    d.flows.forEach(f => {
      const strength = f[2];
      if (flowGroups[strength]) flowGroups[strength].push(f);
    });

    [3,2,1].forEach(s => {
      flowGroups[s].forEach(f => {
        const color = strengthColors[s];
        // Find unit names
        const allUnits = [...d.land, ...d.sea, ...d.air, ...d.defense];
        const fromUnit = allUnits.find(u => u.id === f[0]);
        const toUnit = allUnits.find(u => u.id === f[1]);
        if (fromUnit && toUnit) {
          const domCls = fromUnit.css.replace('card-','');
          html += `<div class="flow-item" style="border-left:3px solid ${color.border}">
            <span class="flow-unit" style="background:${fromUnit.css.includes('land')?'#2d5a27':fromUnit.css.includes('sea')?'#1a3a5c':fromUnit.css.includes('air')?'#5a3a6e':'#5a4a1a'}">${fromUnit.name}</span>
            <span class="flow-arrow flow-${s===3?'strong':s===2?'moderate':'soft'}">→</span>
            <span class="flow-unit" style="background:${toUnit.css.includes('land')?'#2d5a27':toUnit.css.includes('sea')?'#1a3a5c':toUnit.css.includes('air')?'#5a3a6e':'#5a4a1a'}">${toUnit.name}</span>
            <span style="color:${color.border};font-size:10px;margin-left:2px">${f[3]}</span>
          </div>`;
        }
      });
    });

    html += '</div></div>';
    html += '</div>';
  });

  main.innerHTML = html;
}

buildAll();
</script>
